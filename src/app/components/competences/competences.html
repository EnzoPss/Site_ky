<div id="competences">

  <h3>Compétences</h3>

  <div class="competences-content">

    <div class="carousels-wrapper">
      <div
        *ngFor="let category of categories; let i = index"
        class="carousel-row"
      >
        <span class="category-label">{{ category.name }}</span>
        <div class="skills-track-wrapper">
          <div
            class="skills-track"
            [class.reverse]="i % 2 !== 0"
            [style.animation-duration]="getAnimDuration(category.images) + 's'"
            [style.--track-width]="getTrackWidth(category.images)"
          >
            <div class="skill-box" *ngFor="let img of repeat(category.images)">
              <ng-container *ngIf="img.isSeparator; else normalBox">
                <div class="skill-separator"></div>
              </ng-container>
              <ng-template #normalBox>
                <img [src]="'img/' + img.folder + '/' + img.file" [alt]="img.name" />
                <span class="skill-label">{{ img.name }}</span>
              </ng-template>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="cv-container">
      <canvas #cvCanvas class="cv-canvas"></canvas>
      <a href="img/CV_Enzo_Pousse.pdf" download="CV_Enzo_Pousse.pdf" class="cv-download-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"/>
          <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708z"/>
        </svg>
        Télécharger mon CV
      </a>
    </div>

  </div>
</div>
